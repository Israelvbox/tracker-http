<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>reportar torrent — __SITE_NAME__</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <div class="logo"><a href="/" style="color:inherit">__SITE_NAME__</a></div>
    <nav class="nav" id="nav-slot"></nav>
  </header>
</div>

<div class="auth-wrap">
  <div class="term">
    <div class="term-bar">
      <span class="term-dot r"></span>
      <span class="term-dot y"></span>
      <span class="term-dot g"></span>
      <span class="term-title">report</span>
    </div>
    <div class="term-body">
      <div class="prompt-line">
        <span class="ps1">~$</span>
        <span>report --hash <span id="hash-echo" style="color:var(--amber-soft)"></span></span>
      </div>

      <p class="helper-text" id="torrent-name" style="margin-top:-4px;margin-bottom:18px;"></p>

      <div class="msg error" id="msg"></div>
      <div class="msg ok" id="msg-ok"></div>

      <form id="report-form">
        <div class="field">
          <label for="reason">motivo</label>
          <select id="reason" required style="width:100%; background:var(--bg-input); border:1px solid var(--rule); border-radius:var(--radius); color:var(--fg); font-family:var(--mono); font-size:14px; padding:10px 12px;">
            <option value="">selecciona un motivo...</option>
            <option value="illegal">contenido no legal / con copyright</option>
            <option value="malicious">contenido malicioso (malware, virus...)</option>
            <option value="corrupt">archivo corrupto / no descarga bien</option>
            <option value="fake">falso (no es lo que dice ser)</option>
            <option value="other">otro motivo</option>
          </select>
        </div>
        <div class="field">
          <label for="details">detalles (opcional)</label>
          <textarea id="details" rows="4" maxlength="1000" style="width:100%; background:var(--bg-input); border:1px solid var(--rule); border-radius:var(--radius); color:var(--fg); font-family:var(--mono); font-size:14px; padding:10px 12px; resize:vertical;" placeholder="describe brevemente el problema..."></textarea>
        </div>
        <button type="submit" class="btn" id="submit-btn">enviar reporte</button>
      </form>

      <p class="helper-text">
        no necesitas tener cuenta para reportar. los reportes se revisan manualmente y los torrents confirmados como ilegales o maliciosos se eliminan.
      </p>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const hash = params.get("hash") || "";
const name = params.get("name") || "";

document.getElementById("hash-echo").textContent = hash ? hash.slice(0, 12) + "..." : "(sin hash)";
document.getElementById("torrent-name").textContent = name ? "torrent: " + name : "";

const form = document.getElementById("report-form");
const msg = document.getElementById("msg");
const msgOk = document.getElementById("msg-ok");
const btn = document.getElementById("submit-btn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  msg.classList.remove("show");
  msgOk.classList.remove("show");

  if (!hash) {
    msg.textContent = "falta el identificador del torrent. vuelve al listado y usa el botón 'reportar'.";
    msg.classList.add("show");
    return;
  }

  const reason = document.getElementById("reason").value;
  const details = document.getElementById("details").value.trim();

  if (!reason) {
    msg.textContent = "selecciona un motivo.";
    msg.classList.add("show");
    return;
  }

  btn.disabled = true;
  btn.textContent = "enviando...";

  try {
    const res = await apiPost("/api/report", { info_hash: hash, reason, details });
    const data = await res.json();
    if (!res.ok) {
      msg.textContent = data.error || "no se pudo enviar el reporte.";
      msg.classList.add("show");
      btn.disabled = false;
      btn.textContent = "enviar reporte";
      return;
    }
    msgOk.textContent = "reporte enviado. gracias por ayudar a mantener el índice limpio.";
    msgOk.classList.add("show");
    form.style.display = "none";
  } catch (err) {
    msg.textContent = "error de red. inténtalo de nuevo.";
    msg.classList.add("show");
    btn.disabled = false;
    btn.textContent = "enviar reporte";
  }
});
</script>
</body>
</html>
